<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogando - RetroArcade</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        .game-page {
            padding-top: 90px;
            min-height: 100vh;
            background: #0a0a1a;
        }

        .game-header {
            background: #1e1e2e;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6b35;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .back-button {
            background: #ff6b35;
            color: #fff;
            text-decoration: none;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            transition: background 0.3s ease;
        }

        .back-button:hover {
            background: #ff8c5a;
        }

        .game-title {
            color: #ff6b35;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .game-area {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            min-height: 70vh;
            flex-direction: column;
            gap: 1rem;
        }

        iframe {
            width: 100%;
            max-width: 1100px;
            height: 650px;
            border: 2px solid #ff6b35;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }

        #emulatorContainer {
            width: 100%;
            max-width: 1100px;
            min-height: 650px;
            border: 2px solid #ff6b35;
            border-radius: 12px;
            background: #000;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
            overflow: hidden;
        }

        .info-area {
            text-align: center;
            padding: 1rem 2rem 2rem;
        }

        .info-message {
            color: #ff6b35;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .file-selector {
            text-align: center;
            margin: 1rem 0;
            background: #1e1e2e;
            border: 1px solid #333;
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            max-width: 1100px;
        }

        .file-selector input {
            background: #2a2a3a;
            color: #fff;
            border: 1px solid #ff6b35;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            max-width: 420px;
        }

        .loading {
            text-align: center;
            color: #ffaa44;
            font-size: 18px;
            padding: 50px;
        }

        .error {
            text-align: center;
            color: #ff4444;
            padding: 50px;
            font-size: 16px;
            max-width: 900px;
        }

        .helper-text {
            color: #aaa;
            font-size: 12px;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            iframe,
            #emulatorContainer {
                min-height: 450px;
                height: 450px;
            }

            .game-header {
                justify-content: center;
                text-align: center;
            }

            .game-title {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-page">
        <div class="game-header">
            <a href="index.html" class="back-button">← Voltar</a>
            <div class="game-title" id="gameTitle">Carregando...</div>
            <div style="width: 80px;"></div>
        </div>

        <div id="gameArea" class="game-area">
            <div class="loading">⏳ Carregando jogo...</div>
        </div>

        <div id="controlsArea" class="info-area">
            <div id="infoMsg" class="info-message">🎮 Preparando o jogo...</div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURAÇÃO GERAL
        // ============================================
        const savedGame = localStorage.getItem("currentGame");
        const gameTitle = document.getElementById("gameTitle");
        const gameArea = document.getElementById("gameArea");
        const controlsArea = document.getElementById("controlsArea");
        const infoMsg = document.getElementById("infoMsg");

        if (!savedGame) {
            gameTitle.textContent = "Nenhum jogo selecionado";
            gameArea.innerHTML = `
                <div class="error">
                    ❌ Nenhum jogo foi selecionado.<br />
                    Volte para a página inicial e escolha um jogo.
                </div>
            `;
        } else {
            const game = JSON.parse(savedGame);
            gameTitle.textContent = game.title || "Jogo";

            if (game.type === "iframe") {
                loadIframeGame(game);
            } else if (game.type === "rom") {
                loadRomGame(game);
            } else {
                gameArea.innerHTML = `<div class="error">❌ Tipo de jogo inválido.</div>`;
            }
        }

        // ============================================
        // MODO IFRAME
        // ============================================
        function loadIframeGame(game) {
            if (!game.url) {
                gameArea.innerHTML = `<div class="error">❌ URL do jogo não encontrada.</div>`;
                return;
            }

            gameArea.innerHTML = `
                <iframe 
                    src="${game.url}" 
                    allowfullscreen
                    frameborder="0">
                </iframe>
            `;

            infoMsg.innerHTML = "🎮 Clique dentro do jogo | Setas = mover | Z/X = ações | Enter = Start";
            infoMsg.style.color = "#44ff44";
        }

        // ============================================
        // MODO ROM (EMULATORJS)
        // ============================================
        function loadRomGame(game) {
            gameArea.innerHTML = `
                <div id="emulatorContainer"></div>
            `;

            let selectorHtml = "";

            if (game.allowFileSelect || !game.romPath) {
                selectorHtml = `
                    <div class="file-selector">
                        <input type="file" id="romFile" accept=".nes,.smc,.sfc" />
                        <div class="helper-text">
                            📁 Selecione uma ROM no formato .nes, .smc ou .sfc
                        </div>
                    </div>
                `;
            }

            controlsArea.innerHTML = `
                ${selectorHtml}
                <div id="infoMsg" class="info-message">
                    🎮 Preparando ambiente do emulador...
                </div>
            `;

            const newInfoMsg = document.getElementById("infoMsg");

            // Caso tenha ROM do projeto, carrega direto
            if (game.romPath) {
                newInfoMsg.innerHTML = "⏳ Carregando ROM do projeto...";
                startEmulatorFromUrl(game.romPath, game.system || "auto", game.title, newInfoMsg);
            } else {
                newInfoMsg.innerHTML = "📁 Selecione uma ROM para iniciar.";
            }

            // Caso permita selecionar arquivo manualmente
            const romFileInput = document.getElementById("romFile");
            if (romFileInput) {
                romFileInput.addEventListener("change", async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    try {
                        newInfoMsg.innerHTML = `⏳ Lendo arquivo: ${file.name}...`;
                        const extension = getFileExtension(file.name);
                        const system = detectSystemByExtension(extension);

                        if (!system) {
                            throw new Error("Formato não suportado. Use .nes, .smc ou .sfc");
                        }

                        const arrayBuffer = await file.arrayBuffer();
                        const blob = new Blob([arrayBuffer], { type: "application/octet-stream" });
                        const romBlobUrl = URL.createObjectURL(blob);

                        startEmulatorFromUrl(romBlobUrl, system, file.name, newInfoMsg);
                    } catch (error) {
                        console.error(error);
                        newInfoMsg.innerHTML = `❌ ${error.message}`;
                        newInfoMsg.style.color = "#ff4444";
                    }
                });
            }
        }

        // ============================================
        // INICIAR EMULATORJS
        // ============================================
        function startEmulatorFromUrl(romUrl, system, title, statusElement) {
            const container = document.getElementById("emulatorContainer");
            if (!container) return;

            container.innerHTML = "";

            const finalSystem = system === "auto" ? detectSystemByExtension(getFileExtension(romUrl)) : system;

            if (!finalSystem) {
                statusElement.innerHTML = "❌ Não foi possível identificar o sistema da ROM.";
                statusElement.style.color = "#ff4444";
                return;
            }

            statusElement.innerHTML = `🚀 Iniciando ${finalSystem.toUpperCase()}...`;
            statusElement.style.color = "#ffaa44";

            // Limpar config anterior, se existir
            delete window.EJS_player;
            delete window.EJS_gameUrl;
            delete window.EJS_core;
            delete window.EJS_pathtodata;

            // Criar div interna do player
            const playerDiv = document.createElement("div");
            playerDiv.id = "game";
            playerDiv.style.width = "100%";
            playerDiv.style.height = "650px";
            container.appendChild(playerDiv);

            // Configuração do EmulatorJS
            window.EJS_player = "#game";
            window.EJS_gameUrl = romUrl;
            window.EJS_core = mapSystemToCore(finalSystem);
            window.EJS_pathtodata = "emulatorjs/data/";

            // Remover script anterior se existir
            const oldLoader = document.getElementById("ejs-loader");
            if (oldLoader) oldLoader.remove();

            const script = document.createElement("script");
            script.src = "emulatorjs/loader.js";
            script.id = "ejs-loader";

            script.onload = () => {
                statusElement.innerHTML = `🎮 ${title} carregado! Clique na tela do jogo para ativar os controles.`;
                statusElement.style.color = "#44ff44";
            };

            script.onerror = () => {
                statusElement.innerHTML = "❌ Não foi possível carregar o EmulatorJS. Verifique a pasta emulatorjs/";
                statusElement.style.color = "#ff4444";
            };

            document.body.appendChild(script);
        }

        // ============================================
        // HELPERS
        // ============================================
        function getFileExtension(filenameOrUrl) {
            const clean = filenameOrUrl.split("?")[0].toLowerCase();
            const parts = clean.split(".");
            return parts.length > 1 ? parts.pop() : "";
        }

        function detectSystemByExtension(ext) {
            if (ext === "nes") return "nes";
            if (ext === "smc" || ext === "sfc") return "snes";
            return null;
        }

        function mapSystemToCore(system) {
            const cores = {
                nes: "nes",
                snes: "snes"
            };

            return cores[system] || "snes";
        }
    </script>
</body>
</html>
