<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogando - RetroArcade</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-container {
            padding-top: 80px;
            min-height: 100vh;
            background: #0a0a1a;
        }
        
        .game-header {
            background: #1e1e2e;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6b35;
        }
        
        .back-button {
            background: #ff6b35;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .game-info-header {
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .game-iframe {
            width: 100%;
            height: 70vh;
            border: none;
            background: #000;
        }
        
        .game-details {
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .controls-info {
            background: #1e1e2e;
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1rem;
        }
        
        @media (max-width: 768px) {
            .game-iframe {
                height: 50vh;
            }
            
            .game-header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <a href="index.html" class="back-button">← Voltar ao Início</a>
            <h2 id="gameTitle">Carregando jogo...</h2>
            <div style="width: 100px;"></div> <!-- Espaçador -->
        </div>
        
        <iframe id="gameFrame" class="game-iframe" src="about:blank"></iframe>
        
        <div class="game-details">
            <div class="controls-info">
                <h3>🎮 Como jogar</h3>
                <p>Use as setas do teclado ou WASD para movimentar. Pressione espaço ou Enter para ações especiais.</p>
                <p style="font-size: 0.8rem; color: #888; margin-top: 0.5rem;">
                    ⚠️ Alguns jogos podem precisar de clique dentro da tela para funcionar.
                </p>
            </div>
        </div>
    </div>
    
    <script>
        // Carregar o jogo salvo no localStorage
        const savedGame = localStorage.getItem('currentGame');
        
        if (savedGame) {
            const game = JSON.parse(savedGame);
            document.getElementById('gameTitle').textContent = `Jogando: ${game.title}`;
            document.getElementById('gameFrame').src = game.gamePath;
        } else {
            document.getElementById('gameTitle').textContent = 'Nenhum jogo selecionado';
            document.getElementById('gameFrame').src = 'about:blank';
        }
    </script>
</body>
</html>
