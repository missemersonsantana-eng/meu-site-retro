<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogar - RetroGames Hub</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0a0a23, #11113a);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .game-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      margin-bottom: 20px;
    }

    .topbar h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .topbar p {
      color: #bbbbff;
      font-size: 1rem;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button,
    .file-btn {
      background: #ff5a2c;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      display: inline-block;
      text-decoration: none;
    }

    button:hover,
    .file-btn:hover {
      background: #ff784f;
    }

    .hidden-input {
      display: none;
    }

    .status-box {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .player-area {
      width: 100%;
      min-height: 600px;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .player-area iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 12px;
    }

    #game {
      width: 100%;
      min-height: 580px;
    }

    .placeholder {
      color: #bbbbff;
      text-align: center;
      font-size: 1rem;
    }

    @media (max-width: 768px) {
      .topbar h1 {
        font-size: 1.5rem;
      }

      .player-area {
        min-height: 420px;
      }

      #game {
        min-height: 400px;
      }

      .player-area iframe {
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <main class="game-container">
    <header class="topbar">
      <h1 id="game-title">Carregando jogo...</h1>
      <p id="game-subtitle">Preparando ambiente...</p>
    </header>

    <section class="controls">
      <button onclick="goBack()">⬅ Voltar</button>

      <label for="rom-input" id="rom-label" class="file-btn" style="display: none;">
        📂 Selecionar ROM
      </label>

      <input type="file" id="rom-input" class="hidden-input" accept=".nes,.smc,.sfc" />
    </section>

    <section id="status-box" class="status-box">
      Aguarde...
    </section>

    <section id="player-area" class="player-area">
      <div class="placeholder">Aguardando carregamento...</div>
    </section>
  </main>

  <script>
    const selectedGame = JSON.parse(localStorage.getItem("selectedGame"));
    const playerArea = document.getElementById("player-area");
    const romInput = document.getElementById("rom-input");
    const romLabel = document.getElementById("rom-label");
    const statusBox = document.getElementById("status-box");
    const gameTitle = document.getElementById("game-title");
    const gameSubtitle = document.getElementById("game-subtitle");

    if (!selectedGame) {
      gameTitle.textContent = "Nenhum jogo selecionado";
      gameSubtitle.textContent = "Volte para a tela inicial.";
      statusBox.innerHTML = "Nenhum jogo foi selecionado.";
    } else {
      gameTitle.textContent = selectedGame.title || "Jogo";

      if (selectedGame.type === "iframe") {
        loadIframeGame(selectedGame);
      } else if (selectedGame.type === "rom" || selectedGame.type === "local") {
        prepareRomMode(selectedGame);
      } else {
        gameSubtitle.textContent = "Erro";
        statusBox.innerHTML = "Tipo de jogo inválido.";
      }
    }

    function goBack() {
      window.location.href = "index.html";
    }

    function loadIframeGame(game) {
      gameSubtitle.textContent = "Modo jogo online (iframe)";
      statusBox.innerHTML = "Carregando jogo externo...";

      playerArea.innerHTML = `
        <iframe
          src="${game.url}"
          allowfullscreen
          sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
          loading="lazy">
        </iframe>
      `;

      setTimeout(() => {
        statusBox.innerHTML = "Jogo carregado. Divirta-se!";
      }, 1000);
    }

    function prepareRomMode(game) {
      gameSubtitle.textContent = "Modo ROM local";
      romLabel.style.display = "inline-block";

      let systemText = "NES (.nes) ou SNES (.smc / .sfc)";

      if (game.system === "nes") {
        systemText = "NES (.nes)";
      } else if (game.system === "snes") {
        systemText = "SNES (.smc / .sfc)";
      }

      playerArea.innerHTML = `
        <div class="placeholder">
          Selecione uma ROM para iniciar o emulador.
        </div>
      `;

      statusBox.innerHTML = `
        <strong>Pronto para carregar sua ROM</strong><br>
        Sistema esperado: <strong>${systemText}</strong><br>
        Clique em <strong>Selecionar ROM</strong> para iniciar.
      `;

      romInput.value = "";
      romInput.onchange = handleRomSelection;
    }

    function handleRomSelection(event) {
      const file = event.target.files[0];

      if (!file) {
        statusBox.innerHTML = "Nenhuma ROM selecionada.";
        return;
      }

      const extension = file.name.split(".").pop().toLowerCase();

      if (!["nes", "smc", "sfc"].includes(extension)) {
        statusBox.innerHTML = "Formato inválido. Use .nes, .smc ou .sfc.";
        romInput.value = "";
        return;
      }

      if (selectedGame.system === "nes" && extension !== "nes") {
        statusBox.innerHTML = "Este jogo espera uma ROM NES (.nes).";
        romInput.value = "";
        return;
      }

      if (selectedGame.system === "snes" && !["smc", "sfc"].includes(extension)) {
        statusBox.innerHTML = "Este jogo espera uma ROM SNES (.smc ou .sfc).";
        romInput.value = "";
        return;
      }

      startEmulator(file, extension);
    }

    function startEmulator(file, extension) {
      statusBox.innerHTML = `Carregando ROM: <strong>${file.name}</strong>...`;

      playerArea.innerHTML = `<div id="game"></div>`;

      // Limpa configs anteriores
      delete window.EJS_player;
      delete window.EJS_gameName;
      delete window.EJS_biosUrl;
      delete window.EJS_pathtodata;
      delete window.EJS_gameUrl;
      delete window.EJS_core;

      // Configuração do EmulatorJS
      window.EJS_player = "#game";
      window.EJS_gameName = file.name;
      window.EJS_biosUrl = "";
      window.EJS_pathtodata = "emulatorjs/data/";
      window.EJS_gameUrl = URL.createObjectURL(file);
      window.EJS_core = extension === "nes" ? "nes" : "snes";

      // Remove loader antigo
      const oldScript = document.getElementById("emulatorjs-loader");
      if (oldScript) {
        oldScript.remove();
      }

      // Carrega loader local
      const script = document.createElement("script");
      script.src = "./emulatorjs/data/loader.js";
      script.id = "emulatorjs-loader";
      script.async = true;

      script.onload = () => {
        statusBox.innerHTML = `
          <strong>ROM carregada com sucesso!</strong><br>
          Core detectado: <strong>${window.EJS_core.toUpperCase()}</strong><br>
          Aguarde alguns segundos se a tela demorar para abrir.
        `;
      };

      script.onerror = () => {
        statusBox.innerHTML = `
          <strong>Erro ao carregar o EmulatorJS local.</strong><br>
          Verifique se a pasta <strong>emulatorjs/data</strong> existe e contém o arquivo <strong>loader.js</strong>.
        `;
      };

      document.body.appendChild(script);
    }
  </script>
</body>
</html>
