<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroGames Hub - Jogar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1b1033, #09060f 70%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .back-btn {
      background: #7c3aed;
      color: white;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: #6d28d9;
    }

    .title-box h1 {
      font-size: 1.8rem;
      margin-bottom: 4px;
    }

    .title-box p {
      color: #cfc9dd;
      font-size: 0.95rem;
    }

    .player-shell {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    #gameContainer {
      width: 100%;
      min-height: 680px;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 680px;
      border: none;
      border-radius: 14px;
      background: #000;
    }

    #game {
      width: 100%;
      height: 680px;
    }

    .status-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      font-size: 0.95rem;
      color: #ddd;
      line-height: 1.5;
    }

    .error-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 0, 80, 0.12);
      border: 1px solid rgba(255, 0, 80, 0.3);
      color: #ffd7e3;
      display: none;
      white-space: pre-wrap;
    }

    .loading {
      color: #bbb;
      font-size: 1rem;
      text-align: center;
      padding: 20px;
    }

    .file-picker {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.15);
    }

    .file-picker input {
      display: block;
      margin-top: 10px;
      color: white;
    }

    .launch-btn {
      margin-top: 12px;
      background: #22c55e;
      color: #08120d;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .launch-btn:hover {
      background: #16a34a;
    }

    code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }

    @media (max-width: 768px) {
      #gameContainer, iframe, #game {
        min-height: 420px;
        height: 420px;
      }

      .title-box h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <a href="index.html" class="back-btn">⬅ Voltar</a>
      <div class="title-box">
        <h1 id="gameTitle">Carregando jogo...</h1>
        <p id="gameMeta">Preparando emulador...</p>
      </div>
    </div>

    <div class="player-shell">
      <div id="gameContainer">
        <div class="loading" id="loadingMsg">🎮 Carregando jogo...</div>
      </div>

      <div class="status-box" id="statusBox">
        Inicializando...
      </div>

      <div class="error-box" id="errorBox"></div>
      <div id="extraControls"></div>
    </div>
  </div>

  <script>
    const gameTitle = document.getElementById("gameTitle");
    const gameMeta = document.getElementById("gameMeta");
    const gameContainer = document.getElementById("gameContainer");
    const statusBox = document.getElementById("statusBox");
    const errorBox = document.getElementById("errorBox");
    const extraControls = document.getElementById("extraControls");

    function setStatus(msg) {
      console.log("[STATUS]", msg);
      statusBox.innerHTML = msg;
    }

    function showError(msg) {
      console.error("[ERRO]", msg);
      errorBox.style.display = "block";
      errorBox.textContent = msg;
      setStatus("❌ Ocorreu um erro ao carregar o jogo.");
    }

    function detectSystemFromFile(fileName) {
      const lower = fileName.toLowerCase();

      if (lower.endsWith(".nes")) return "nes";
      if (lower.endsWith(".smc") || lower.endsWith(".sfc")) return "snes";

      return null;
    }

    function loadEmulator(gameUrl, core, gameId) {
      setStatus(`🚀 Iniciando EmulatorJS...<br>Core: <code>${core}</code><br>Origem: <code>${gameUrl}</code>`);

      gameContainer.innerHTML = `<div id="game"></div>`;

      window.EJS_player = "#game";
      window.EJS_core = core;
      window.EJS_gameUrl = gameUrl;
      window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
      window.EJS_startOnLoaded = true;
      window.EJS_gameID = gameId || "retro_game";

      const oldScript = document.getElementById("emulatorjs-loader");
      if (oldScript) oldScript.remove();

      const script = document.createElement("script");
      script.id = "emulatorjs-loader";
      script.src = "https://cdn.emulatorjs.org/stable/data/loader.js";

      script.onload = () => {
        setStatus(
          `✅ EmulatorJS carregado.<br>` +
          `Core: <code>${window.EJS_core}</code><br>` +
          `ROM: <code>${String(window.EJS_gameUrl).substring(0, 120)}</code><br>` +
          `GameID: <code>${window.EJS_gameID}</code>`
        );
      };

      script.onerror = () => {
        showError("Falha ao carregar loader.js do EmulatorJS.");
      };

      document.body.appendChild(script);
    }

    function initIframeGame(gameData) {
      if (!gameData.url) {
        showError("URL do iframe não encontrada.");
        return;
      }

      setStatus("🌐 Carregando jogo via iframe...");

      const iframe = document.createElement("iframe");
      iframe.src = gameData.url;
      iframe.allowFullscreen = true;

      iframe.onload = () => {
        setStatus("✅ Jogo iframe carregado com sucesso.");
      };

      iframe.onerror = () => {
        showError("Falha ao carregar o iframe.");
      };

      gameContainer.innerHTML = "";
      gameContainer.appendChild(iframe);
    }

    function initManualRom(gameData) {
      setStatus("📁 Selecione uma ROM local (.nes, .smc, .sfc)");

      gameContainer.innerHTML = `
        <div class="loading">
          🎮 Modo de ROM manual ativo
        </div>
      `;

      extraControls.innerHTML = `
        <div class="file-picker">
          <strong>Carregar sua própria ROM</strong>
          <p style="margin-top:8px; color:#ccc;">Selecione um arquivo .nes, .smc ou .sfc do seu computador.</p>
          <input type="file" id="romFileInput" accept=".nes,.smc,.sfc" />
          <button class="launch-btn" id="launchRomBtn">Iniciar ROM</button>
        </div>
      `;

      const fileInput = document.getElementById("romFileInput");
      const launchBtn = document.getElementById("launchRomBtn");

      launchBtn.addEventListener("click", () => {
        const file = fileInput.files[0];

        if (!file) {
          showError("Nenhum arquivo selecionado.");
          return;
        }

        const detectedSystem = detectSystemFromFile(file.name);

        if (!detectedSystem) {
          showError("Formato não suportado. Use .nes, .smc ou .sfc");
          return;
        }

        const romBlobUrl = URL.createObjectURL(file);
        const gameId = (gameData.id || gameData.title || "manual_rom")
          .toString()
          .replace(/\s+/g, "_")
          .toLowerCase();

        loadEmulator(romBlobUrl, detectedSystem, gameId);
      });
    }

    function initAutoRom(gameData) {
      if (!gameData.romPath) {
        showError("romPath não informado.");
        return;
      }

      if (!gameData.system || gameData.system === "auto") {
        showError("Para ROM automática, o campo 'system' precisa estar definido (ex: nes, snes).");
        return;
      }

      setStatus(`🧠 Validando ROM automática: <code>${gameData.romPath}</code>`);

      fetch(gameData.romPath, { method: "GET" })
        .then(response => {
          if (!response.ok) {
            throw new Error(`ROM não encontrada (${response.status}) em: ${gameData.romPath}`);
          }

          return response.blob();
        })
        .then(() => {
          const gameId = (gameData.id || gameData.title || "retro_game")
            .toString()
            .replace(/\s+/g, "_")
            .toLowerCase();

          setStatus(`✅ ROM localizada. Iniciando com core <code>${gameData.system}</code>...`);

          loadEmulator(gameData.romPath, gameData.system, gameId);
        })
        .catch(err => {
          showError(
            "Não foi possível acessar a ROM automática.\n\n" +
            err.message + "\n\n" +
            "Verifique:\n" +
            "- caminho do romPath\n" +
            "- nome exato do arquivo\n" +
            "- extensão real (.smc, .sfc, .nes)\n" +
            "- Live Server aberto na raiz do projeto"
          );
        });
    }

    // =========================
    // INÍCIO
    // =========================
    let gameData = null;

    try {
      const stored = localStorage.getItem("currentGame");
      if (!stored) {
        throw new Error("Nenhum jogo encontrado no localStorage.");
      }

      gameData = JSON.parse(stored);
      console.log("[GAME DATA]", gameData);
    } catch (err) {
      showError("Falha ao carregar dados do jogo.\n\n" + err.message);
      throw err;
    }

    gameTitle.textContent = gameData.title || "Jogo sem nome";
    gameMeta.textContent = `${gameData.category || "SEM CATEGORIA"} • ${gameData.year || "----"}`;

    if (gameData.type === "iframe") {
      initIframeGame(gameData);
    } else if (gameData.type === "rom") {
      if (gameData.allowFileSelect) {
        initManualRom(gameData);
      } else {
        initAutoRom(gameData);
      }
    } else {
      showError(`Tipo de jogo inválido: ${gameData.type}`);
    }
  </script>
</body>
</html>
