<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogando - RetroArcade</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .game-page {
            padding-top: 80px;
            min-height: 100vh;
            background: #0a0a1a;
        }
        
        .game-header {
            background: #1e1e2e;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6b35;
        }
        
        .back-button {
            background: #ff6b35;
            color: #fff;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        
        .game-frame {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            min-height: 70vh;
        }
        
        iframe {
            width: 800px;
            height: 600px;
            border: 2px solid #ff6b35;
            border-radius: 10px;
            background: #000;
        }
        
        .game-details {
            text-align: center;
            padding: 1rem;
            color: #ff6b35;
        }
        
        @media (max-width: 900px) {
            iframe {
                width: 100%;
                height: 450px;
            }
        }
    </style>
</head>
<body>
    <div class="game-page">
        <div class="game-header">
            <a href="index.html" class="back-button">← Voltar</a>
            <h2 id="gameTitle">Carregando...</h2>
            <div style="width: 80px;"></div>
        </div>
        
        <div class="game-frame">
            <iframe id="gameFrame" src="about:blank" allowfullscreen></iframe>
        </div>
        
        <div class="game-details">
            <p>🎮 Clique dentro do jogo para ativar os controles</p>
            <p>💡 Use as setas do teclado e as teclas Z/X</p>
        </div>
    </div>
    
    <script>
        // Pegar o jogo salvo no localStorage
        const savedGame = localStorage.getItem('currentGame');
        
        if (savedGame) {
            const game = JSON.parse(savedGame);
            document.getElementById('gameTitle').textContent = game.title;
            document.getElementById('gameFrame').src = game.url;
        } else {
            document.getElementById('gameTitle').textContent = 'Nenhum jogo selecionado';
        }
    </script>
</body>
</html>
