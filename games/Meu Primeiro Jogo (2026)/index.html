<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo Exemplo - RetroArcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
        }
        
        .game-wrapper {
            text-align: center;
        }
        
        canvas {
            border: 3px solid #ff6b35;
            background: #0a0a1a;
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.3);
        }
        
        .controls {
            color: #ff6b35;
            margin-top: 20px;
            font-size: 14px;
        }
        
        .score {
            color: #fff;
            font-size: 20px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="score">Pontos: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div class="controls">
            🎮 Use as SETAS do teclado para mover o quadrado laranja<br>
            🟧 Pegue os quadrados azuis para ganhar pontos!
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Player
        let player = {
            x: canvas.width / 2 - 15,
            y: canvas.height / 2 - 15,
            width: 30,
            height: 30,
            speed: 5
        };
        
        // Itens para coletar
        let items = [];
        let score = 0;
        
        // Teclas pressionadas
        const keys = {
            ArrowUp: false,
            ArrowDown: false,
            ArrowLeft: false,
            ArrowRight: false
        };
        
        // Criar itens iniciais
        for(let i = 0; i < 5; i++) {
            spawnItem();
        }
        
        function spawnItem() {
            items.push({
                x: Math.random() * (canvas.width - 20),
                y: Math.random() * (canvas.height - 20),
                width: 15,
                height: 15
            });
        }
        
        // Eventos de teclado
        document.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
            }
        });
        
        // Movimentação
        function movePlayer() {
            if(keys.ArrowUp && player.y > 0) player.y -= player.speed;
            if(keys.ArrowDown && player.y + player.height < canvas.height) player.y += player.speed;
            if(keys.ArrowLeft && player.x > 0) player.x -= player.speed;
            if(keys.ArrowRight && player.x + player.width < canvas.width) player.x += player.speed;
        }
        
        // Colisão com itens
        function checkCollisions() {
            for(let i = 0; i < items.length; i++) {
                const item = items[i];
                if(player.x < item.x + item.width &&
                   player.x + player.width > item.x &&
                   player.y < item.y + item.height &&
                   player.y + player.height > item.y) {
                    items.splice(i, 1);
                    score++;
                    document.getElementById('score').textContent = score;
                    spawnItem();
                    break;
                }
            }
        }
        
        // Desenhar
        function draw() {
            // Limpar tela
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar borda
            ctx.strokeStyle = '#ff6b35';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar player
            ctx.fillStyle = '#ff6b35';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            // Efeito glow no player
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff6b35';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;
            
            // Desenhar itens
            ctx.fillStyle = '#3a86ff';
            for(const item of items) {
                ctx.fillRect(item.x, item.y, item.width, item.height);
            }
        }
        
        // Loop do jogo
        function gameLoop() {
            movePlayer();
            checkCollisions();
            draw();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
