<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroGames Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <header class="hero">
    <div class="hero-content">
      <span class="hero-badge">🎮 Arcade • Retro • EmulatorJS</span>
      <h1>RetroGames Hub</h1>
      <p>
        Sua central retrô com jogos via <strong>iframe</strong>,
        ROMs <strong>NES</strong> e <strong>SNES</strong>.
      </p>

      <div class="hero-actions">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar por nome, categoria, descrição ou tag..."
          class="search-input"
        />
        <button
          class="clear-btn"
          id="clearSearchBtn"
          type="button"
        >
          Limpar
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="section-header">
      <div>
        <h2>Biblioteca de Jogos</h2>
        <p>Seus jogos são carregados dinamicamente pelo <code>script.js</code>.</p>
      </div>
      <div class="library-stats">
        <span id="gameCount">0 jogos</span>
      </div>
    </section>

    <section class="games-section">
      <div id="gamesGrid" class="games-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>RetroGames Hub • V4.5 MASTER DEFINITIVA • Compatível com seu script.js real</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const clearBtn = document.getElementById("clearSearchBtn");
      const searchInput = document.getElementById("searchInput");

      if (clearBtn && searchInput) {
        clearBtn.addEventListener("click", () => {
          searchInput.value = "";
          if (typeof renderGames === "function") {
            renderGames();
          }
          searchInput.focus();
        });
      }
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
