<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RetroGames Hub</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <header class="hero">
    <div class="hero-content">
      <span class="hero-badge">🎮 Arcade • Retro • EmulatorJS • ELITE</span>
      <h1>RetroGames Hub</h1>
      <p>
        Sua central retrô com jogos via <strong>iframe</strong>,
        ROMs <strong>NES</strong> e <strong>SNES</strong>, com visual premium.
      </p>

      <div class="hero-actions">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar por nome, categoria, descrição ou tag..."
          class="search-input"
        />
        <button
          class="clear-btn"
          onclick="document.getElementById('searchInput').value=''; renderGames();"
        >
          Limpar
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <section class="section-header">
      <div>
        <h2>Biblioteca de Jogos</h2>
        <p>Jogos carregados dinamicamente pelo <code>script.js</code>.</p>
      </div>
      <div class="library-stats">
        <span id="gameCount">0 jogos</span>
      </div>
    </section>

    <section class="games-section">
      <div id="gamesGrid" class="games-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>RetroGames Hub • V4.9 ELITE ABSOLUTE • Premium Visual + ROM Auto/Manual</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
